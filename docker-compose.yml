version: "3.9"

services:

  # ── Go backend ──────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
    environment:
      HTTP_PORT: "${HTTP_PORT:-8080}"
    ports:
      - "${HTTP_PORT:-8080}:${HTTP_PORT:-8080}"

  # ── Vite frontend ───────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./front
      target: dev
    env_file: ./front/.env
    environment:
      # Переопределяем VITE_API_TARGET: внутри Docker-сети бэкенд доступен
      # по имени сервиса "backend", а не через localhost
      VITE_API_TARGET: "http://backend:${HTTP_PORT:-8080}"
    volumes:
      - ./front/src:/app/src
      - ./front/index.html:/app/index.html
      - ./front/vite.config.js:/app/vite.config.js
    ports:
      - "${VITE_PORT:-5173}:${VITE_PORT:-5173}"
    depends_on:
      - backend
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      retries: 10
volumes:
  pg_data:
