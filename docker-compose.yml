version: "3.9"

services:
  frontend:
    build:
      context: ./front
      target: dev
    env_file: ./front/.env
    volumes:
      # Монтируем только исходники для hot-reload.
      # node_modules берётся из образа (npm install внутри Dockerfile).
      - ./front/src:/app/src
      - ./front/index.html:/app/index.html
      - ./front/vite.config.js:/app/vite.config.js
    ports:
      - "${VITE_PORT:-5173}:${VITE_PORT:-5173}"
