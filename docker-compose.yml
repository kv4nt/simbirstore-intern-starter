version: "3.9"

services:

  # ── Go backend ──────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
    environment:
      HTTP_PORT: "${HTTP_PORT:-8080}"
    ports:
      - "${HTTP_PORT:-8080}:${HTTP_PORT:-8080}"

  # ── Vite frontend ───────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./front
      target: dev
    env_file: ./front/.env
    environment:
      # Внутри Docker-сети обращаемся к сервису по имени из BACKEND_HOST
      VITE_API_TARGET: "http://${BACKEND_HOST:-backend}:${HTTP_PORT:-8080}"
    volumes:
      - ./front/src:/app/src
      - ./front/index.html:/app/index.html
      - ./front/vite.config.js:/app/vite.config.js
    ports:
      - "${VITE_PORT:-5173}:${VITE_PORT:-5173}"
    depends_on:
      - backend
