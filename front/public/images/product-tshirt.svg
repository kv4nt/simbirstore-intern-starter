<svg xmlns='http://www.w3.org/2000/svg' width='400' height='400' viewBox='0 0 400 400'>
  <rect width='400' height='400' fill='#e8f0fe'/>
  <!-- body -->
  <rect x='120' y='170' width='160' height='150' rx='6' fill='#4a7fe8'/>
  <!-- left sleeve -->
  <polygon points='120,170 80,140 60,185 120,210' fill='#4a7fe8'/>
  <!-- right sleeve -->
  <polygon points='280,170 320,140 340,185 280,210' fill='#4a7fe8'/>
  <!-- collar -->
  <path d='M160,170 Q200,195 240,170' fill='none' stroke='#2a5abf' stroke-width='8' stroke-linecap='round'/>
  <!-- shadow under sleeves -->
  <polygon points='120,170 80,140 60,185 120,210' fill='#2a5abf' opacity='0.15'/>
  <polygon points='280,170 320,140 340,185 280,210' fill='#2a5abf' opacity='0.15'/>
  <text x='200' y='355' font-family='Arial,sans-serif' font-size='20' font-weight='bold' fill='#2a5abf' text-anchor='middle'>Футболка</text>
</svg>